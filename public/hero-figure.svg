<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" fill="none">
  <defs>
    <linearGradient id="bodyGrad" x1="200" y1="0" x2="200" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="200" y1="100" x2="200" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer glow silhouette -->
  <ellipse cx="200" cy="400" rx="120" ry="320" fill="url(#glowGrad)" opacity="0.5"/>
  <!-- Tactical armored soldier silhouette -->
  <g fill="url(#bodyGrad)" filter="url(#glow)">
    <!-- Helmet -->
    <path d="M170 80 C170 40 230 40 230 80 L235 110 C235 125 165 125 165 110 Z"/>
    <!-- Visor slit -->
    <rect x="178" y="85" width="44" height="6" rx="2" fill="#0a0a0a" opacity="0.8"/>
    <!-- Neck guard -->
    <path d="M172 120 L228 120 L235 140 L165 140 Z"/>
    <!-- Shoulders + pauldrons -->
    <path d="M140 145 L165 140 L165 170 L130 175 Z"/>
    <path d="M260 145 L235 140 L235 170 L270 175 Z"/>
    <!-- Torso — tactical vest -->
    <path d="M155 140 L245 140 L252 260 L148 260 Z"/>
    <!-- Chest plate detail -->
    <rect x="180" y="160" width="40" height="50" rx="2" fill="#0a0a0a" opacity="0.15"/>
    <!-- Belt / waist -->
    <rect x="152" y="255" width="96" height="16" rx="2"/>
    <!-- Pouches -->
    <rect x="155" y="272" width="20" height="18" rx="1"/>
    <rect x="225" y="272" width="20" height="18" rx="1"/>
    <!-- Upper legs — armored -->
    <path d="M158 275 L195 275 L192 400 L155 400 Z"/>
    <path d="M205 275 L242 275 L245 400 L208 400 Z"/>
    <!-- Knee guards -->
    <ellipse cx="175" cy="405" rx="22" ry="14"/>
    <ellipse cx="225" cy="405" rx="22" ry="14"/>
    <!-- Lower legs -->
    <path d="M158 415 L192 415 L190 540 L155 540 Z"/>
    <path d="M208 415 L242 415 L245 540 L210 540 Z"/>
    <!-- Boots -->
    <path d="M150 535 L195 535 L198 570 C198 580 145 580 145 570 Z"/>
    <path d="M205 535 L250 535 L255 570 C255 580 202 580 202 570 Z"/>
    <!-- Right arm — holding weapon -->
    <path d="M130 175 L115 180 L100 300 L108 310 L125 300 L135 260 Z"/>
    <!-- Left arm — at side -->
    <path d="M270 175 L285 180 L295 310 L287 320 L275 310 L265 260 Z"/>
    <!-- Weapon — rifle silhouette -->
    <path d="M95 295 L110 290 L115 190 L120 185 L125 190 L120 290 L130 340 L122 345 L108 310 Z" opacity="0.7"/>
    <!-- Weapon barrel -->
    <rect x="114" y="140" width="5" height="55" rx="1" opacity="0.6"/>
    <!-- Antenna on helmet -->
    <rect x="225" y="50" width="3" height="40" rx="1" opacity="0.5"/>
    <circle cx="226" cy="48" r="3" opacity="0.4"/>
  </g>
</svg>